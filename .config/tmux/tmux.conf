##### Prefix #####
# Use Ctrl + Space as prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g base-index 1
setw -g pane-base-index 1

# Reload configuration quickly
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux.conf"
bind R refresh-client

##### Mouse & Clipboard #####
# Enable mouse support
set -g mouse on

# Sync tmux clipboard with OS clipboard (WSL / Windows)
set -g set-clipboard on


##### Copy mode (Vim-style) #####
# Use Vim keys in copy-mode
setw -g mode-keys vi
set -sg escape-time 0
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi V send-keys -X select-line


##### Pane splitting #####
bind v split-window -h   # split right
bind s split-window -v   # split bottom


##### Pane navigation (Vim-style, no prefix) #####
# Uncomment if you want pane movement without prefix
# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

# Allow vim keybinds to work correctly
set -g focus-events on


##### Terminal / Colors #####
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"


##### Catppuccin Theme Settings #####
set -g @catppuccin_flavor "mocha"

# One Dark background
set -g @catppuccin_status_background "#282c34"
set -g @catppuccin_status_module_bg_color "#282c34"

# Window names
set -g automatic-rename off
set -g allow-rename off
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

# Git info
set -g @catppuccin_git_status true
set -g @catppuccin_git_branch true


##### Status Line #####
set -g status-left ""
set -g status-right-length 100
set -g status-left-length 100
set -g status-right "#{E:@catppuccin_status_application}"


##### Plugins (TPM) #####
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Theme
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Vim ↔ tmux navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Automatically save/restore tmux sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'

# Copy selections to system clipboard
set -g @yank_selection 'clipboard'
set -g @override_copy_command 'xclip -in -selection clipboard'


##### TPM initialization #####
run '~/.config/tmux/plugins/tpm/tpm'

# Keep renamed window names visible for inactive windows too.
# Catppuccin "basic" style defaults to #T for inactive windows; force #W.
set -g window-status-format "#[fg=#11111b,bg=#{@thm_overlay_2}] #I #[fg=#cdd6f4,bg=#{@thm_surface_0}] #W "
set -g window-status-current-format "#[fg=#11111b,bg=#{@thm_mauve}] #I #[fg=#cdd6f4,bg=#{@thm_surface_1}] #W "
