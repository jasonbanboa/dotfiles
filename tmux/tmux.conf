##### Prefix #####
# Use Ctrl + Space as prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g base-index 1
setw -g pane-base-index 1

# Reload configuration quickly
unbind r
bind r source-file ~/dotfiles/tmux/tmux.conf \; display-message "Reloaded tmux.conf"
bind R refresh-client

##### Mouse & Clipboard #####
# Enable mouse support
set -g mouse on

# Sync tmux clipboard with OS clipboard (WSL / Windows)
set -g set-clipboard on


##### Copy mode (Vim-style) #####
# Use Vim keys in copy-mode
setw -g mode-keys vi
set -sg escape-time 0
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi V send-keys -X select-line


##### Pane splitting #####
bind v split-window -h   # split right
bind s split-window -v   # split bottom


##### Pane navigation (Vim-style, no prefix) #####
# Uncomment if you want pane movement without prefix
# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

# Allow vim keybinds to work correctly
set -g focus-events on


##### Terminal / Colors #####
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Window names
set -g automatic-rename off
set -g allow-rename off
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

# Git info
set -g @catppuccin_git_status true
set -g @catppuccin_git_branch true


##### Status Line #####
set -g status-left ""
set -g status-right-length 100
set -g status-left-length 100
set -g status-right "#{E:@catppuccin_status_application}"


##### Plugins (TPM) #####
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Theme
##### Minimal theme (raw tmux.conf) #####
# Theme defaults (edit these to customize)
set -g @minimal_theme_bg_color "#1A1D23"
set -g @minimal_theme_active_color "#B4BEFE"
set -g @minimal_theme_inactive_color "#6C7086"
set -g @minimal_theme_text_color "#CDD6F4"
set -g @minimal_theme_accent_color "#B4BEFE"
set -g @minimal_theme_border_color "#44475A"
set -g @minimal_theme_session_icon ""
set -g @minimal_theme_dir_icon ""
set -g @minimal_theme_date_icon ""

# Status bar setup
set -g status on
set -g status-position top
set -g status-interval 3
set -g status-justify centre

# Status bar colors and style
set -g status-style "bg=#1A1D23,fg=#cdd6f4"
set -g status-left-length 100
set -g status-right-length 100

# Pane borders
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#b4befe"

# Message style
set -g message-style "bg=#1A1D23,fg=#cdd6f4,bold"
set -g message-command-style "bg=#1A1D23,fg=#cdd6f4,bold"

# Window status format
set -g window-status-format "#[fg=#6c7086,bg=#1A1D23] #I:#W "
set -g window-status-current-format "#[fg=#b4befe,bg=#1A1D23,bold] #I:#W#F "
set -g window-status-separator ""

# Status left (session name)
set -g status-left "#[fg=#b4befe,bold]  #S #[fg=#6c7086]│ "

# Status right (system info)
# - dir: shows ~ if pane path == $HOME, otherwise basename of current path
# - mem: uses `free` (Linux); adjust if on macOS
# - battery: reads /sys/class/power_supply (Linux); prints N/A otherwise

set -g status-right "\
#[fg=#b4befe] #[fg=#cdd6f4]#([ #{pane_current_path} = $HOME ] && echo '~' || basename #{pane_current_path}) \
#[fg=#6c7086]│ \
#[fg=#b4befe] #[fg=#cdd6f4]#(date +'%Y-%m-%d %H:%M') "

# Copy mode styling
set -g mode-style "bg=#b4befe,fg=#1A1D23"

# Clock mode
set -g clock-mode-colour "#B4BEFE"
set -g clock-mode-style 24

# Vim ↔ tmux navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Automatically save/restore tmux sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'

# Copy selections to system clipboard
set -g @yank_selection 'clipboard'
set -g @override_copy_command 'xclip -in -selection clipboard'


##### TPM initialization #####
run '~/.config/tmux/plugins/tpm/tpm'

